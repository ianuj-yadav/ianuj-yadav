name: Update Profile Art

on:
  schedule:
    # Run once a day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install scraper dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch contributions & render heatmap
        env:
          GH_PROFILE_USER: ianuj-yadav
        run: |
          python scripts/fetch_contributions.py
          python scripts/render_heatmap_svg.py

      - name: Commit & push updated contribution graph
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: daily update of contribution graph [skip ci]"
            git push
          else
            echo "No contribution updates to commit."
          fi
